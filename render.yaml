databases:
  - name: proyecto_web
    plan: free
    databaseName: djangodb
    user: djangouser

services:
  - type: web
    name: mi-tienda-django
    plan: free
    env: python
    buildCommand: "./build.sh"
    startCommand: "gunicorn configuracion_core.wsgi:application"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: mi_base_de_datos
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: WEB_CONCURRENCY
        value: 4
