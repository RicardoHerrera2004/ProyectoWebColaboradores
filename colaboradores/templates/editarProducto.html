{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editar Producto | Intranet</title>
    <link rel="stylesheet" href="{% static 'css/panel.css' %}">
</head>
<body>

    <header class="header-principal">
        <nav class="navbar" aria-label="Navegación principal">
            <span class="navbar__brand">Intranet de Ollas</span>
            
            <menu class="navbar__menu">
                <li>
                    <a href="{% url 'panel' %}" class="btn btn--enlace">Volver al Panel</a>
                </li>
            </menu>
        </nav>
    </header>

    <main class="contenedor">
        
        <header class="cabecera-seccion">
            <h1>Editando: {{ producto.nombre }}</h1>
        </header>
        
        <section class="tarjeta tarjeta--edicion">
            <form method="POST" class="formulario-vertical">
                {% csrf_token %}
                
                <label for="nombre">Nombre:</label>
                <input type="text" id="nombre" name="nombre" value="{{ producto.nombre }}" required class="input">
                
                <label for="precio">Precio ($):</label>
                <input type="number" id="precio" name="precio" value="{{ producto.precio }}" step="0.01" required class="input">
                
                <label for="stock">Stock:</label>
                <input type="number" id="stock" name="stock" value="{{ producto.stock }}" required class="input">
                
                <button type="submit" class="btn btn--exito btn--bloque">
                    Actualizar Producto
                </button>
            </form>
        </section>

    </main>

</body>
</html>
