{% load static %}
<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Zona Secreta VIP</title>
    <link rel="stylesheet" href="{% static 'css/panel.css' %}" />
  </head>
  <body class="pantalla-completa">
    <main class="tarjeta tarjeta--oscura">
      <header class="cabecera-seccion">
        <h1>Bienvenido a la Zona VIP, {{ nombre }} 🎩</h1>
      </header>

      <section class="caja-resaltada">
        <p>Has entrado al sistema paralelo.</p>
        <p>Solo los usuarios con una sesión manual activa pueden ver esto.</p>
      </section>

      <footer class="pie-tarjeta pie-tarjeta--sin-borde">
        <a href="{% url 'logout_vip' %}" class="btn btn--vip-peligro">
          Cerrar Sesión VIP
        </a>
      </footer>
    </main>
  </body>
</html>
